<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Vault</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🔐 Dev Vault</h1>
    <p class="subtitle">Quick-paste anything — it auto-categorizes</p>
  </header>

  <main>
    <!-- ===== INPUT FORM ===== -->
    <section id="form-section" class="card">
      <form id="entry-form">
        <div class="form-group">
          <label for="project-input">Project name</label>
          <input
            type="text"
            id="project-input"
            placeholder="e.g. my-app, work-project"
            required
          />
        </div>
        <div class="form-group">
          <label for="content-input">Content</label>
          <textarea
            id="content-input"
            placeholder="Paste a link, API key, code snippet, or note..."
            rows="4"
            required
          ></textarea>
        </div>
        <button type="submit" id="save-btn">Save to Vault</button>
      </form>
    </section>

    <!-- ===== FILTERS ===== -->
    <section id="filter-section">
      <h2>Entries</h2>
      <div id="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="link">Link</button>
        <button class="filter-btn" data-filter="api_key">API Key</button>
        <button class="filter-btn" data-filter="code_snippet">Code Snippet</button>
        <button class="filter-btn" data-filter="generic_api">Generic API</button>
        <button class="filter-btn" data-filter="note">Note</button>
      </div>
    </section>

    <!-- ===== ENTRY LIST ===== -->
    <section id="entries-section">
      <div id="entry-list">
        <!-- Entries are rendered here by JavaScript -->
      </div>
      <!-- Shown when there are no entries at all -->
      <div id="empty-state" class="empty-state">
        <p>No entries yet. Paste something above to get started!</p>
      </div>
      <!-- Shown when a filter hides everything -->
      <div id="filter-empty-state" class="empty-state hidden">
        <p>No entries match this filter.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
